services:
  web:
    build: ./docker/php
    ports:
      - "8080:80"
    links:
      - mariaDB
    environment:
      SYMFONY_ENV: dev
      # see https://registry.hub.docker.com/u/jderusse/dns-gen/
      #- DOMAIN_NAME=thelia.docker
    command: /usr/sbin/apache2ctl -D FOREGROUND
    volumes:
      - .:/var/www/html
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariaDB   # nom du service MySQL
      PMA_USER: root      # ou l'utilisateur souhaité
      PMA_PASSWORD: toor
    depends_on:
      - mariaDB
  mariaDB:
    image: mariadb
    environment:
      MYSQL_DATABASE: thelia
      MYSQL_ROOT_PASSWORD: toor
