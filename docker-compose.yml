services:
    web:
      build: ./docker/php
      ports:
        - "8080:80"
      links:
        - mariaDB
      environment:
        SYMFONY_ENV: dev
        # see https://registry.hub.docker.com/u/jderusse/dns-gen/
        #- DOMAIN_NAME=thelia.docker
      command: /usr/sbin/apache2ctl -D FOREGROUND
      volumes:
        - .:/var/www/html
    phpmyadmin:
      image: phpmyadmin/phpmyadmin:latest
      ports:
        - "8081:80"
      environment:
        PMA_HOST: mariaDB
        PMA_USER: root
        PMA_PASSWORD: toor
      links:
        - mariaDB

    mariaDB:
      image: mariadb
      environment:
        MYSQL_DATABASE: thelia
        MYSQL_ROOT_PASSWORD: toor
