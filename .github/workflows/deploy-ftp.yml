name: Deploy via FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup FTP credentials and replace database config
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Host: $FTP_HOST"
          echo "Port: ${FTP_PORT:-21}"
          echo "Username: $FTP_USERNAME"
          
          # Replace database placeholder values with GitHub secrets
          sed -i "s/__DB_HOST__/$DB_HOST/g" local/config/database_prod.yml
          sed -i "s/__DB_NAME__/$DB_NAME/g" local/config/database_prod.yml
          sed -i "s/__DB_USER__/$DB_USER/g" local/config/database_prod.yml
          sed -i "s/__DB_PASSWORD__/$DB_PASSWORD/g" local/config/database_prod.yml
          
          cat local/config/database_prod.yml

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./
          server-dir: www/
          exclude: |
            **/.git/**
            **/.gitignore
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/vendor/**
            **/*.md
            **/README*
            **/CHANGELOG*
            **/LICENSE*
            **/.travis.yml
            **/.gitattributes
            **/phpunit.xml
            **/composer.json
            **/composer.lock
            **/docker-compose.yml
            **/docker/**
            **/tests/**
            **/cache/**
            **/log/**
            **/setup/**
            **/Thelia/**
            **/bin/**
            **/core/**
            **/UPGRADE*
            **/UPDATE*
            **/CONTRIBUTORS*
            **/COPYRIGHT*
            **/reset_install*
            **/run-tests*
            **/travis.php*
            **/unit-tests*
            **/php-cs/**
            **/php-cs.bat
            **/commits/**
            **/templates/frontOffice/electro/assets/images/products/**
            **/templates/frontOffice/electro/assets/images/product/**

