name: Deploy via FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '5.6'
          extensions: mbstring, intl, pdo_mysql, gd, xml, zip
          coverage: none



      - name: Install Composer dependencies
        run: |
          composer install --no-interaction --prefer-dist

      - name: Setup FTP credentials and replace database config

        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Host: $FTP_HOST"
          echo "Port: ${FTP_PORT:-21}"
          echo "Username: $FTP_USERNAME"
          
          # Replace database placeholder values with GitHub secrets
          sed -i "s/__DB_HOST__/$DB_HOST/g" local/config/database_prod.yml
          sed -i "s/__DB_NAME__/$DB_NAME/g" local/config/database_prod.yml
          sed -i "s/__DB_USER__/$DB_USER/g" local/config/database_prod.yml
          sed -i "s/__DB_PASSWORD__/$DB_PASSWORD/g" local/config/database_prod.yml
          
          cat local/config/database_prod.yml

      - name: Drop and recreate database
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Install MySQL client if needed
          sudo apt-get update && sudo apt-get install -y mysql-client
          
          # Drop and recreate database
          mysql -h $DB_HOST -u $DB_USER -p$DB_PASSWORD -e "SET FOREIGN_KEY_CHECKS = 0; DROP DATABASE IF EXISTS $DB_NAME; SET FOREIGN_KEY_CHECKS = 1; CREATE DATABASE $DB_NAME;"
          echo "Database $DB_NAME dropped and recreated successfully"

      - name: Install Thelia database
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          php Thelia thelia:install --db_host=$DB_HOST --db_username=$DB_USER --db_password=$DB_PASSWORD --db_name=$DB_NAME
          echo "Thelia database installed successfully"

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./
          server-dir: www/
          exclude: |
            **/.git/**
            **/.gitignore
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/*.md
            **/README*
            **/CHANGELOG*
            **/LICENSE*
            **/.travis.yml
            **/.gitattributes
            **/phpunit.xml
            **/docker-compose.yml
            **/docker/**
            **/tests/**
            **/cache/**
            **/log/**
            **/setup/**
            **/bin/**
            **/UPGRADE*
            **/UPDATE*
            **/CONTRIBUTORS*
            **/COPYRIGHT*
            **/reset_install*
            **/run-tests*
            **/travis.php*
            **/unit-tests*
            **/php-cs/**
            **/php-cs.bat
            **/commits/**